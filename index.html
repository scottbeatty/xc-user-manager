<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F5 XC User Manager</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: #333;
    }
    h1 { text-align: center; color: #0066cc; margin-bottom: 30px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      margin: 20px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    label { font-weight: 600; display: block; margin: 14px 0 6px; color: #444; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #0066cc; }
    button {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 20px 0 0;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,102,204,0.4); }
    button:disabled { background: #aaa; cursor: not-allowed; transform: none; box-shadow: none; }
    .status { padding: 14px 18px; border-radius: 8px; margin: 16px 0; display: none; font-weight: 500; }
    .status.info { display: block; background: #e7f3ff; color: #004085; border-left: 4px solid #0066cc; }
    .status.success { display: block; background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .status.error { display: block; background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .pbar { width: 100%; height: 24px; background: #e9ecef; border-radius: 12px; overflow: hidden; margin: 16px 0; display: none; }
    .pfill { height: 100%; background: linear-gradient(90deg, #0066cc, #00aaff); transition: width 0.3s ease; width: 0%; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
    th { background: linear-gradient(135deg, #f8f9fa, #e9ecef); padding: 12px 10px; text-align: left; border: 1px solid #dee2e6; font-weight: 600; }
    td { padding: 10px; border: 1px solid #dee2e6; word-break: break-all; }
    tr:nth-child(even) td { background: #f8f9fa; }
    tr:hover td { background: #e7f3ff; }
    h3 { margin-top: 24px; }
    ul { padding-left: 20px; }
    li { padding: 4px 0; }
    .footer { text-align: center; margin-top: 30px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <h1>F5 XC User Manager</h1>

  <div class="card">
    <label>Tenant Name</label>
    <input type="text" id="tenant" placeholder="e.g. acmecorp">
    <label>API Token</label>
    <input type="password" id="token" placeholder="Paste your XC API token">
    <button onclick="connect()">Connect & Load Groups</button>
  </div>

  <div class="card" id="actions" style="display:none;">
    <label>Action</label>
    <select id="action" onchange="onActionChange()">
      <option value="create">Create new users</option>
      <option value="rotate">Rotate passwords (delete old + create new)</option>
      <option value="delete">Delete all generated users</option>
    </select>
    <div id="countRow">
      <label>Number of Users</label>
      <input type="number" id="count" value="10" min="1" max="200">
    </div>
    <div id="groupRow">
      <label>User Group</label>
      <select id="group"></select>
    </div>
    <button id="runBtn" onclick="run()">Run</button>
  </div>

  <div class="status" id="status"></div>
  <div class="pbar" id="pbar"><div class="pfill" id="pfill"></div></div>
  <div id="results"></div>
  <div class="footer">Powered by Netlify + F5 Distributed Cloud</div>

<script>
const PROXY = "/.netlify/functions/proxy";
let currentTenant = "", currentToken = "";

function setStatus(m, t) { const e = document.getElementById("status"); e.textContent = m; e.className = "status " + t; }
function setProgress(p) { const b = document.getElementById("pbar"), f = document.getElementById("pfill"); if (p < 0) { b.style.display = "none"; return; } b.style.display = "block"; f.style.width = p + "%"; }
function onActionChange() { const a = document.getElementById("action").value; document.getElementById("countRow").style.display = a === "delete" ? "none" : "block"; document.getElementById("groupRow").style.display = a === "delete" ? "none" : "block"; }

async function xcFetch(method, path, body) {
  const resp = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tenant: currentTenant, token: currentToken, method, path, body })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function randomHex8() { const b = new Uint8Array(4); crypto.getRandomValues(b); return Array.from(b).map(x => x.toString(16).padStart(2, "0")).join(""); }
function randomPassword(n) { const c = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+[]{}:,.?"; const b = new Uint8Array(n); crypto.getRandomValues(b); return Array.from(b).map(x => c[x % c.length]).join(""); }

async function connect() {
  currentTenant = document.getElementById("tenant").value.trim().toLowerCase();
  currentToken = document.getElementById("token").value.trim();
  if (!currentTenant || !currentToken) { setStatus("Enter tenant and token.", "error"); return; }
  setStatus("Connecting to " + currentTenant + "...", "info");
  try {
    const data = await xcFetch("GET", "/api/web/namespaces/system/user_groups");
    const groups = (data.items || []).map(g => g.name || (g.metadata && g.metadata.name)).filter(Boolean).sort();
    if (!groups.length) { setStatus("No groups found.", "error"); return; }
    const sel = document.getElementById("group");
    sel.innerHTML = "";
    groups.forEach(g => { const o = document.createElement("option"); o.value = g; o.textContent = g; sel.appendChild(o); });
    document.getElementById("actions").style.display = "block";
    setStatus("Connected to " + currentTenant + ". " + groups.length + " groups.", "success");
  } catch (e) { setStatus("Connection failed: " + e.message, "error"); }
}

async function run() {
  const action = document.getElementById("action").value;
  const count = parseInt(document.getElementById("count").value) || 10;
  const group = document.getElementById("group").value;
  document.getElementById("runBtn").disabled = true;
  document.getElementById("results").innerHTML = "";
  setProgress(5);
  try {
    if (action === "create") await doCreate(count, group);
    else if (action === "rotate") await doRotate(count, group);
    else await doDelete();
  } catch (e) { setStatus("Error: " + e.message, "error"); }
  finally { setProgress(-1); document.getElementById("runBtn").disabled = false; }
}

async function doCreate(count, group) {
  setStatus("Creating " + count + " users...", "info");
  const created = [], errors = [];
  for (let i = 1; i <= count; i++) {
    setProgress(Math.round((i-1)/count*100));
    const u = "user"+i+"-"+randomHex8(), e = u+"@"+currentTenant+".local", p = randomPassword(10);
    try {
      await xcFetch("POST", "/api/web/custom/namespaces/system/user_roles", { name:e, namespace:"system", type:"USER", first_name:"User", last_name:""+i, email:e, idm_type:"VOLTERRA_MANAGED", namespace_roles:[], group_names:[group] });
      created.push({index:i, username:u, email:e, password:p, group});
    } catch(x) { errors.push({email:e, error:x.message}); }
  }
  setProgress(100); showResults(created, [], errors);
}

async function doRotate(count, group) {
  setStatus("Finding existing users...", "info");
  const pat = /^user\d+-[a-f0-9]{8}$/;
  const d = await xcFetch("GET", "/api/web/custom/namespaces/system/user_roles");
  const old = (d.items||[]).filter(u => { const e=u.email||u.name||""; return pat.test(e.split("@")[0]); });
  const deleted=[], created=[], errors=[], total=old.length+count;
  if (old.length) {
    setStatus("Deleting "+old.length+" old users...", "info");
    for (let i=0; i<old.length; i++) { setProgress(Math.round(i/total*100)); const e=old[i].email||old[i].name; try { await xcFetch("POST","/api/web/custom/namespaces/system/users/cascade_delete",{email:e,namespace:"system"}); deleted.push(e); } catch(x) { errors.push({email:e,error:x.message}); } }
  }
  setStatus("Creating "+count+" new users...", "info");
  for (let i=1; i<=count; i++) { setProgress(Math.round((old.length+i-1)/total*100)); const u="user"+i+"-"+randomHex8(), e=u+"@"+currentTenant+".local", p=randomPassword(10); try { await xcFetch("POST","/api/web/custom/namespaces/system/user_roles",{name:e,namespace:"system",type:"USER",first_name:"User",last_name:""+i,email:e,idm_type:"VOLTERRA_MANAGED",namespace_roles:[],group_names:[group]}); created.push({index:i,username:u,email:e,password:p,group}); } catch(x) { errors.push({email:e,error:x.message}); } }
  setProgress(100); showResults(created, deleted, errors);
}

async function doDelete() {
  setStatus("Finding users...", "info");
  const pat = /^user\d+-[a-f0-9]{8}$/;
  const d = await xcFetch("GET", "/api/web/custom/namespaces/system/user_roles");
  const t = (d.items||[]).filter(u => { const e=u.email||u.name||""; return pat.test(e.split("@")[0]); });
  if (!t.length) { setStatus("No generated users found.", "info"); return; }
  if (!confirm("Delete "+t.length+" users?")) { setStatus("Cancelled.", "info"); return; }
  const deleted=[], errors=[];
  for (let i=0; i<t.length; i++) { setProgress(Math.round(i/t.length*100)); const e=t[i].email||t[i].name; try { await xcFetch("POST","/api/web/custom/namespaces/system/users/cascade_delete",{email:e,namespace:"system"}); deleted.push(e); } catch(x) { errors.push({email:e,error:x.message}); } }
  setProgress(100); showResults([], deleted, errors);
}

function showResults(created, deleted, errors) {
  let h = "";
  if (created.length) { h += "<h3 style='color:#155724'>Created Users ("+created.length+")</h3><table><tr><th>#</th><th>Email</th><th>Password</th><th>Group</th></tr>"; created.forEach(u => { h += "<tr><td>"+u.index+"</td><td>"+u.email+"</td><td><code>"+u.password+"</code></td><td>"+u.group+"</td></tr>"; }); h += "</table>"; }
  if (deleted.length) { h += "<h3 style='color:#856404'>Deleted ("+deleted.length+")</h3><ul>"; deleted.forEach(e => { h += "<li>"+e+"</li>"; }); h += "</ul>"; }
  if (errors.length) { h += "<h3 style='color:#721c24'>Errors ("+errors.length+")</h3><ul>"; errors.forEach(e => { h += "<li><b>"+e.email+"</b>: "+e.error+"</li>"; }); h += "</ul>"; }
  document.getElementById("results").innerHTML = h;
  setStatus("Done. Created: "+created.length+", Deleted: "+deleted.length+", Errors: "+errors.length, errors.length ? "error" : "success");
}
</script>
</body>
</html>
